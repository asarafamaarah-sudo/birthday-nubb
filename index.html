<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy 20th Birthday Nubb! ✨</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body, html {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Dancing Script', cursive;
    background: url('pink_background.jpg') no-repeat center center fixed;
    background-size: cover;
    position: relative;
  }

  /* ── video ── */
  #bgVideo {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    z-index: 1;        /* sits above body bg, below overlay + message */
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  #bgVideo.show-video {
    display: block;
    opacity: 1;
  }

  /* dark overlay sits just above video, below message */
  #videoOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.25);
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    transition: opacity 1.4s ease;
  }
  #videoOverlay.show { opacity: 1; }

  /* ── floating particles ── */
  .heart, .sparkle {
    position: absolute;
    pointer-events: none;
    will-change: transform, opacity;
    z-index: 50;
  }
  .heart {
    width: 30px; height: 30px;
    background: #ff3366;
    clip-path: polygon(50% 0%,61% 10%,70% 20%,75% 30%,70% 40%,50% 60%,30% 40%,25% 30%,30% 20%,39% 10%);
    opacity: 0.85;
  }
  .sparkle {
    width: 8px; height: 8px;
    background: radial-gradient(circle, gold, #ffcc66);
    border-radius: 50%;
    opacity: 0.9;
  }

  /* ── message ── */
  #messageContainer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    font-size: clamp(2.2rem, 8vw, 4.2rem);
    z-index: 100;
    opacity: 0;
    transition: opacity 1s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    text-shadow: 2px 2px 12px #ff69b4, 0 0 20px #ff99cc;
    background: rgba(255, 105, 135, 0.25);
    backdrop-filter: blur(10px);
    padding: 0.4em 1.2em;
    border-radius: 70px;
    white-space: nowrap;
    letter-spacing: 2px;
    pointer-events: none;
  }
  @media (max-width: 550px) {
    #messageContainer {
      white-space: normal;
      line-height: 1.3;
      padding: 0.5rem 1rem;
      width: 85%;
    }
  }
  #messageContainer.show { opacity: 1; }

  /* ── tap hint ── */
  .tap-hint {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    color: rgba(255, 245, 220, 0.95);
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(5px);
    width: fit-content;
    margin: 0 auto;
    padding: 6px 22px;
    border-radius: 60px;
    pointer-events: none;
    z-index: 100;
    font-weight: 500;
    animation: gentleFloat 1.8s infinite alternate;
    letter-spacing: 1px;
    transition: opacity 0.6s ease;
  }
  @keyframes gentleFloat {
    from { opacity: 0.5; transform: translateY(0px) scale(0.96); }
    to   { opacity: 1;   transform: translateY(-3px) scale(1);   }
  }
  .tap-hint.hide { opacity: 0; pointer-events: none; }

  .birthday-ribbon {
    position: absolute;
    bottom: 18px; right: 18px;
    font-size: 0.85rem;
    color: #ffe2ec;
    background: #ff7b9cb3;
    padding: 4px 12px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    font-family: monospace;
    z-index: 12;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    .tap-hint { font-size: 1rem; bottom: 20px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<video id="bgVideo" autoplay loop playsinline>
  <source src="birthday_video.mp4" type="video/mp4">
</video>

<div id="videoOverlay"></div>

<div id="messageContainer">
  🎉 Happy 20th Birthday Nubb! 🎉
</div>

<div class="tap-hint" id="tapHint">✨ tap anywhere to reveal the magic ✨</div>
<div class="birthday-ribbon">🎂 20th · forever young 🎂</div>

<script>
(function () {
  const messageDiv  = document.getElementById('messageContainer');
  const video       = document.getElementById('bgVideo');
  const tapHintEl   = document.getElementById('tapHint');
  const overlay     = document.getElementById('videoOverlay');

  let revealed = false;

  /* ── ambient particles ── */
  function createParticle(type) {
    const p = document.createElement('div');
    p.classList.add(type);
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    document.body.appendChild(p);
    const dx = (Math.random() - 0.5) * 2.2;
    const dy = -Math.random() * 2.5 - 1.2;
    let opacity = 0.9;
    const id = setInterval(() => {
      y += dy; x += dx; opacity -= 0.012;
      p.style.transform = `translate(${x}px,${y}px)`;
      p.style.opacity = opacity;
      if (opacity <= 0.02 || y < -100 || x > window.innerWidth + 200 || x < -200) {
        clearInterval(id);
        p.remove();
      }
    }, 18);
  }

  setInterval(() => { createParticle('heart'); setTimeout(() => createParticle('sparkle'), 60); }, 320);
  setInterval(() => { if (Math.random() > 0.65) createParticle('sparkle'); }, 280);

  /* ── explosion ── */
  function createExplosion(cx, cy) {
    for (let i = 0; i < 32; i++) {
      const isHeart = Math.random() > 0.45;
      const p = document.createElement('div');
      p.classList.add(isHeart ? 'heart' : 'sparkle');
      if (isHeart && Math.random() > 0.7) { p.style.width = '38px'; p.style.height = '38px'; }
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 7 + 3.5;
      let x = cx, y = cy, opacity = 1;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed - 1.2;
      const id = setInterval(() => {
        x += vx; y += vy; vy += 0.18; opacity -= 0.022;
        p.style.transform = `translate(${x}px,${y}px)`;
        p.style.opacity = opacity;
        if (opacity <= 0.02 || y > window.innerHeight + 150) { clearInterval(id); p.remove(); }
      }, 16);
    }
    for (let s = 0; s < 12; s++) {
      const sp = document.createElement('div');
      sp.classList.add('sparkle');
      sp.style.cssText = `width:12px;height:12px;background:radial-gradient(circle,#fff0a3,#ffcc55);left:${cx+(Math.random()-0.5)*40}px;top:${cy+(Math.random()-0.5)*40}px`;
      document.body.appendChild(sp);
      const ang = Math.random()*2*Math.PI, spd = Math.random()*5+2;
      let bx=cx,by=cy,op=0.95,vx=Math.cos(ang)*spd,vy=Math.sin(ang)*spd-1;
      const id = setInterval(()=>{
        bx+=vx;by+=vy;vy+=0.12;op-=0.025;
        sp.style.transform=`translate(${bx}px,${by}px)`;sp.style.opacity=op;
        if(op<=0.02){clearInterval(id);sp.remove();}
      },18);
    }
  }

  /* ── post-reveal heart rain + sparkle wave ── */
  function afterRevealCelebration() {
    let rain = setInterval(() => {
      const h = document.createElement('div');
      h.classList.add('heart');
      let xPos = Math.random() * window.innerWidth;
      h.style.left = xPos+'px'; h.style.top = '-40px';
      h.style.width = '28px'; h.style.height = '28px';
      document.body.appendChild(h);
      let yPos=-40, xDrift=(Math.random()-0.5)*1.4, fo=0.9;
      const id=setInterval(()=>{
        yPos+=3.8;xPos+=xDrift;fo-=0.014;
        h.style.transform=`translate(${xDrift*(yPos+40)/3.8}px,${yPos+40}px)`;
        h.style.opacity=fo;
        if(yPos>window.innerHeight+100||fo<=0.02){clearInterval(id);h.remove();}
      },20);
    },220);
    setTimeout(()=>clearInterval(rain),7000);

    for(let i=0;i<60;i++){
      setTimeout(()=>{
        const t=document.createElement('div');
        t.classList.add('sparkle');
        t.style.left=Math.random()*window.innerWidth+'px';
        t.style.top=Math.random()*window.innerHeight+'px';
        t.style.width='7px';t.style.height='7px';
        document.body.appendChild(t);
        let f=1;
        const id=setInterval(()=>{ f-=0.05;t.style.opacity=f;if(f<=0){clearInterval(id);t.remove();} },40);
      },i*35);
    }
  }

  /* ── floating emoji burst ── */
  function floatEmoji(cx, cy) {
    const pool=['✨','🎂','20','💖','🎈'];
    for(let i=0;i<18;i++){
      setTimeout(()=>{
        const d=document.createElement('div');
        d.innerText=pool[Math.floor(Math.random()*pool.length)];
        d.style.cssText=`position:absolute;left:${cx+(Math.random()-0.5)*180}px;top:${cy+(Math.random()-0.5)*150}px;font-size:28px;pointer-events:none;opacity:1;font-weight:bold;text-shadow:0 0 6px hotpink;z-index:250`;
        document.body.appendChild(d);
        let yOff=0,life=1;
        const id=setInterval(()=>{
          yOff-=1.2;life-=0.02;
          d.style.transform=`translateY(${yOff}px)`;d.style.opacity=life;
          if(life<=0){clearInterval(id);d.remove();}
        },35);
      },i*45);
    }
  }

  /* ── MAIN REVEAL ── */
  function revealBirthday(e) {
    if (revealed) return;
    revealed = true;

    let cx, cy;
    if (e.touches) { cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
    else            { cx=e.clientX;            cy=e.clientY;            }
    if (!cx || !cy) { cx=window.innerWidth/2;  cy=window.innerHeight/2; }

    /* 1. Explosion */
    createExplosion(cx, cy);

    /* 2. Show message */
    messageDiv.classList.add('show');

    /* 3. Hide tap hint */
    tapHintEl.classList.add('hide');

    /* 4. Swap background → video */
    setTimeout(() => {
      document.body.style.backgroundImage = 'none';

      /* unmute here — this runs inside a user-gesture callback so browsers allow it */
      video.muted  = false;
      video.volume = 1.0;

      video.style.display = 'block';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          video.classList.add('show-video');
          overlay.classList.add('show');
        });
      });

      video.play().catch(() => {
        /* if browser still blocks (e.g. power saving mode), fall back to muted */
        video.muted = true;
        video.play();
      });
    }, 900);

    /* 5. Extra celebration */
    setTimeout(() => afterRevealCelebration(), 400);

    /* 6. Floating emoji */
    floatEmoji(cx, cy);
  }

  /* ── post-reveal mini burst on tap ── */
  function miniBurst(cx, cy) {
    for(let i=0;i<14;i++){
      const p=document.createElement('div');
      p.classList.add(Math.random()>0.5?'heart':'sparkle');
      p.style.left=cx+'px';p.style.top=cy+'px';
      document.body.appendChild(p);
      const angle=Math.random()*2*Math.PI, speed=Math.random()*5+2;
      let mx=cx,my=cy,op=1;
      const id=setInterval(()=>{
        mx+=Math.cos(angle)*speed;my+=Math.sin(angle)*speed;op-=0.025;
        p.style.transform=`translate(${mx}px,${my}px)`;p.style.opacity=op;
        if(op<=0){clearInterval(id);p.remove();}
      },16);
    }
  }

  /* ── event listeners ── */
  function handleTap(e) {
    if(e.type==='touchstart') e.preventDefault();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    if (!revealed) { revealBirthday(e); }
    else           { miniBurst(cx, cy); }
  }

  document.addEventListener('click',      handleTap);
  document.addEventListener('touchstart', handleTap, { passive: false });

  /* preload video silently */
  video.style.display='none';
  video.load();

  /* warm-up particles */
  for(let i=0;i<18;i++){
    setTimeout(()=>{ createParticle('heart'); createParticle('sparkle'); }, i*120);
  }

  console.log('🎂 Happy 20th Birthday Nubb! Tap anywhere 💖');
})();
</script>
</body>
</html>
